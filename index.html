<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marathon Live Tracker</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <!-- Hamburger menu (debug mode access) -->
  <button id="hamburger-btn" class="hamburger-btn" aria-label="Open menu">&#9776;</button>
  <div id="hamburger-menu" class="hamburger-menu" hidden>
    <div class="hamburger-menu-content">
      <button id="menu-set-start-btn" class="menu-action-btn">Set Piotr Start Time</button>
      <div class="debug-toggle-container">
        <label class="debug-toggle-label" for="debug-toggle">
          <span>Projection Mode</span>
          <input type="checkbox" id="debug-toggle" class="debug-toggle-input">
          <span class="debug-toggle-switch"></span>
        </label>
      </div>
      <div class="time-slider-container" id="time-slider-container" style="display: none;">
        <label for="time-slider" class="time-slider-label">
          Race Progress: <span id="time-slider-value">0</span>%
        </label>
        <input type="range" id="time-slider" class="time-slider" min="0" max="100" value="0">
      </div>

      <!-- Checkpoint input -->
      <div class="checkpoint-section">
        <div class="checkpoint-header">Checkpoints</div>
        <div id="checkpoint-list" class="checkpoint-list"></div>
        <div class="checkpoint-input-row">
          <select id="checkpoint-km" class="checkpoint-select">
            <option value="">km</option>
            <option value="5">5K</option>
            <option value="10">10K</option>
            <option value="15">15K</option>
            <option value="20">20K</option>
            <option value="25">25K</option>
            <option value="30">30K</option>
            <option value="35">35K</option>
            <option value="40">40K</option>
          </select>
          <input type="time" id="checkpoint-time" class="checkpoint-time-input" step="1" placeholder="HH:MM:SS">
          <button id="checkpoint-add-btn" class="checkpoint-add-btn" title="Add checkpoint">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Runner info panel -->
  <div id="info-panel" class="info-panel" style="display: none;">
    <div class="info-item">
      <span class="info-label">Clock</span>
      <span class="info-value" id="info-wall-time">--:--</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Start</span>
      <span class="info-value" id="info-start-time">--:--</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Elapsed</span>
      <span class="info-value" id="info-elapsed">0:00:00</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Distance</span>
      <span class="info-value" id="info-distance">0.0 mi</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Mile Pace</span>
      <span class="info-value" id="info-mile-pace">--:--</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Avg Pace</span>
      <span class="info-value" id="info-avg-pace">--:--</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-item">
      <span class="info-label">Est. Remaining</span>
      <span class="info-value" id="info-remaining">--:--</span>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
